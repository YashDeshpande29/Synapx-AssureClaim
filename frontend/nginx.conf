server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy all backend API routes to the FastAPI service ──────────────
    # Requests go:  browser -> nginx:80 -> backend:8000
    # Same origin from the browser's perspective — no CORS required.
    location ~ ^/(health|docs|redoc|openapi\.json|process|process-text|upload) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        client_max_body_size 50M;
    }

    # ── SPA fallback — all other routes serve index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico { access_log off; log_not_found off; }
}
